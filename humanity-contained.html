<script>
(function(){
  var MENU_MUSIC_URL = 'assets/audio/Fogged_Corridor.mp3';
  var menuAudio = new Audio(MENU_MUSIC_URL);
  menuAudio.loop = true;
  menuAudio.volume = 0.5;
  menuAudio.preload = 'auto';

  function isMenuVisible(){ return !!document.querySelector('.menu'); }
  function tryPlay(){
    if (isMenuVisible() && menuAudio.paused) {
      menuAudio.play().catch(function(){});
    } else if (!isMenuVisible() && !menuAudio.paused) {
      menuAudio.pause();
    }
  }

  document.addEventListener('click',  tryPlay, { capture:true });
  document.addEventListener('keydown', tryPlay, { capture:true });
  new MutationObserver(tryPlay).observe(document.body, { childList:true, subtree:true });
})();
</script>
